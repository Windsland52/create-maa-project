name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: node scripts/sync-release-version.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: mkdir -p dist/npm && pnpm pack --pack-destination dist/npm
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: dist/npm/*.tgz
          if-no-files-found: error

  sea:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_os: win
            arch: x86_64
          - runner: windows-11-arm
            asset_os: win
            arch: aarch64
          - runner: ubuntu-latest
            asset_os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            asset_os: linux
            arch: aarch64
          - runner: macos-15-intel
            asset_os: macos
            arch: x86_64
          - runner: macos-latest
            asset_os: macos
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: node scripts/sync-release-version.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:sea
        env:
          CREATE_MAA_PROJECT_RELEASE_OS: ${{ matrix.asset_os }}
          CREATE_MAA_PROJECT_RELEASE_ARCH: ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: sea-${{ matrix.asset_os }}-${{ matrix.arch }}
          path: dist/sea/create-maa-project-${{ matrix.asset_os }}-${{ matrix.arch }}*
          if-no-files-found: error

  release-manifest:
    needs: sea
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node scripts/sync-release-version.mjs
      - uses: actions/download-artifact@v7
        with:
          pattern: sea-*
          merge-multiple: true
          path: dist/release-assets
      - run: node scripts/create-release-manifest.mjs dist/release-assets dist/release/create-maa-project-manifest.json
      - uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: dist/release/create-maa-project-manifest.json
          if-no-files-found: error

  git_cliff:
    name: Generate release notes
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release notes
        shell: bash
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="2.13.1"
          archive="git-cliff-${version}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p "$RUNNER_TEMP/git-cliff"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${version}/$archive" -o "$RUNNER_TEMP/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/git-cliff"
          git_cliff="$(find "$RUNNER_TEMP/git-cliff" -type f -name git-cliff -perm -111 | head -n 1)"
          if [[ -z "$git_cliff" ]]; then
            echo "[ERR] git-cliff binary was not found after extraction"
            exit 1
          fi
          "$git_cliff" --config .github/cliff.toml --latest --strip header --output CHANGES.md
      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: CHANGES.md

  github-release:
    needs: [release-manifest, git_cliff]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: sea-*
          merge-multiple: true
          path: dist/release
      - uses: actions/download-artifact@v7
        with:
          name: release-manifest
          path: dist/release
      - uses: actions/download-artifact@v7
        with:
          name: release-notes
          path: dist/release-notes
      - uses: softprops/action-gh-release@v3
        with:
          body_path: dist/release-notes/CHANGES.md
          files: dist/release/*

  npm:
    needs: check
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: npm-package
          path: dist/npm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm publish dist/npm/*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node scripts/sync-release-version.mjs
      - uses: actions/download-artifact@v7
        with:
          name: release-manifest
          path: .release
      - run: node scripts/prepare-pypi-release.mjs .release/create-maa-project-manifest.json
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
